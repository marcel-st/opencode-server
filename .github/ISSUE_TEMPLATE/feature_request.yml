name: Feature Request
description: Suggest an improvement to deployment, docs, or workflows
labels: [enhancement]
body:
  - type: input
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: It is hard to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the desired behavior
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other options you evaluated

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits, and what risks/tradeoffs exist?
