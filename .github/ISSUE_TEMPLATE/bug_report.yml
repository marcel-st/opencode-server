name: Bug Report
description: Report a reproducible problem in setup, runtime, or docs
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the issue
      placeholder: docker compose up fails during opencode build
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact commands and actions
      placeholder: |
        1. docker context use remote
        2. docker compose build opencode
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Paste relevant versions and setup details
      value: |
        - Host OS:
        - Docker version:
        - Docker Compose version:
        - Docker context type (local/remote):
        - GPU model and driver (if applicable):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste sanitized logs (no secrets)
      render: shell
