# ──────────────────────────────────────────────────────────────────────────────
# opencode-server  ·  docker-compose.yaml
#
# Services
#   opencode   – headless opencode server (secured with basic-auth)
#   ollama     – local LLM runtime with NVIDIA GPU passthrough
#   open-webui – browser UI for managing / chatting with ollama models
#
# Quick start
#   1. Change OPENCODE_SERVER_USERNAME / OPENCODE_SERVER_PASSWORD below.
#   2. docker compose up -d
#   3. Pull a model on the remote host:
#        docker compose exec ollama ollama pull qwen2.5-coder:7b
#   4. From your laptop connect with the opencode CLI:
#        opencode attach http://<username>:<password>@<remote-host>:4096
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── opencode server ──────────────────────────────────────────────────────────
  opencode:
    build: .
    ports:
      - "4096:4096"
    environment:
      # ── Authentication ────────────────────────────────────────────────────────
      # Change these credentials before exposing the server to the internet.
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: changeme

      # ── Provider: Ollama ──────────────────────────────────────────────────────
      # Tells opencode which model to use by default.
      # Format: <provider-id>/<model-name>  – must match a model pulled in ollama.
      OPENCODE_DEFAULT_MODEL: "ollama/qwen2.5-coder:7b"

      # ── Server network settings (overrides config/opencode.json) ─────────────
      # These match the CMD flags in the Dockerfile; listed here for visibility.
      # Hostname 0.0.0.0 is required so the container is reachable from outside.

    volumes:
      # Provider / model configuration
      - ./config/opencode.json:/root/.config/opencode/opencode.json:ro
      # Persist opencode session data (conversation history, etc.)
      - opencode_data:/root/.local/share/opencode
    depends_on:
      - ollama
    restart: unless-stopped

  # ── Ollama ───────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # NVIDIA GPU passthrough – remove the `deploy` block if no GPU is available.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── Open WebUI ───────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  opencode_data:
  openwebui_data:
