# ──────────────────────────────────────────────────────────────────────────────
# opencode-server  ·  docker-compose.yaml
#
# Designed to be executed from a LOCAL machine whose Docker client is pointed
# at a REMOTE Docker host (e.g. via a Docker context or the DOCKER_HOST
# environment variable).  All services run on the remote host; only the .env
# file and this Compose file need to exist locally.
#
# Remote Docker context setup (one-time, on your laptop):
#   docker context create remote \
#     --docker "host=ssh://user@<remote-host>"
#   docker context use remote
#
# Services
#   opencode   – headless opencode server (secured with basic-auth)
#   ollama     – local LLM runtime with NVIDIA GPU passthrough
#   open-webui – browser UI for managing / chatting with ollama models
#   searxng    – private metasearch engine used for web search in Open WebUI
#
# Quick start (run from your laptop after setting up the remote context)
#   1. cp .env.example .env  and set OPENCODE_SERVER_USERNAME / PASSWORD.
#   2. docker compose build
#   3. docker compose up -d
#   4. Pull a model on the remote host (executed from your laptop):
#        docker compose exec ollama ollama pull qwen2.5-coder:7b
#   5. From your laptop connect with the opencode CLI:
#        opencode attach http://<username>:<password>@<remote-host>:4096
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── opencode server ──────────────────────────────────────────────────────────
  opencode:
    build: .
    ports:
      - "4096:4096"
    environment:
      # ── Authentication ────────────────────────────────────────────────────────
      # Credentials are read from the .env file (see .env.example).
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}

      # ── Provider: Ollama ──────────────────────────────────────────────────────
      # Tells opencode which model to use by default.
      # Format: <provider-id>/<model-name>  – must match a model pulled in ollama.
      OPENCODE_DEFAULT_MODEL: "ollama/qwen2.5-coder:7b"

    volumes:
      # Persist opencode session data (conversation history, etc.)
      # Named volumes are created on the remote Docker host automatically.
      - opencode_data:/home/opencode/.local/share/opencode
    networks:
      - backend
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "--max-time", "5", "http://127.0.0.1:4096/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Ollama ───────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.21.2
    # Port 11434 is intentionally NOT published to the host – it is only reachable
    # by other containers on the internal Docker networks defined below.
    environment:
      # Enable Flash Attention – lower VRAM usage and faster token generation.
      OLLAMA_FLASH_ATTENTION: "1"
      # Keep the loaded model in VRAM indefinitely; avoids the cold-start
      # reload penalty between requests.  Set to e.g. "10m" to unload after
      # ten minutes of idle time.
      OLLAMA_KEEP_ALIVE: "-1"
      # Maximum number of requests processed in parallel.  Each additional
      # slot requires extra VRAM; tune down if you run out of memory.
      # Overridable via OLLAMA_NUM_PARALLEL in the .env file.
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-4}
      # Quantize the KV cache to 8-bit.  Cuts VRAM usage by ~50 % for the
      # cache with negligible quality loss.  Use "q4_0" for even smaller
      # footprint on memory-constrained GPUs.
      OLLAMA_KV_CACHE_TYPE: "q8_0"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend
      - frontend
    # Increase shared-memory available to CUDA kernels.
    shm_size: '512m'
    # Allow the CUDA runtime to lock GPU memory pages (improves throughput).
    ulimits:
      memlock: -1
      stack: 67108864
    # NVIDIA GPU passthrough – remove the `deploy` block if no GPU is available.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Open WebUI ───────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.2
    # Bound to localhost only – access via SSH tunnel or a TLS reverse proxy.
    # SSH tunnel example: ssh -L 3000:localhost:3000 user@<remote-host>
    ports:
      - "127.0.0.1:3000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      # Enable web search in chats via the internal SearXNG service.
      ENABLE_RAG_WEB_SEARCH: "true"
      RAG_WEB_SEARCH_ENGINE: "searxng"
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>&format=json"
      # Optional tuning knobs (overridable from .env).
      RAG_WEB_SEARCH_RESULT_COUNT: ${RAG_WEB_SEARCH_RESULT_COUNT:-5}
      RAG_WEB_SEARCH_CONCURRENT_REQUESTS: ${RAG_WEB_SEARCH_CONCURRENT_REQUESTS:-10}
      # Raise the HTTP client timeout so large-model responses are not cut off.
      AIOHTTP_CLIENT_TIMEOUT: "300"
      # Disable outbound community-sharing calls and telemetry to keep all
      # traffic on the local network and avoid unnecessary latency.
      ENABLE_COMMUNITY_SHARING: "false"
      ENABLE_TELEMETRY: "false"
    volumes:
      - openwebui_data:/app/backend/data
    networks:
      - frontend
    depends_on:
      ollama:
        condition: service_healthy
      searxng:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── SearXNG (private web search backend for Open WebUI) ────────────────────
  searxng:
    image: searxng/searxng:latest
    environment:
      BASE_URL: http://searxng:8080/
      INSTANCE_NAME: opencode-searxng
    networks:
      - frontend
    restart: unless-stopped

networks:
  backend:
  frontend:

volumes:
  ollama_data:
  opencode_data:
  openwebui_data:
